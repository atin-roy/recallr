spring:
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:local}"
  application:
    name: api
    security:
      jwt:
        secret: "${JWT_SECRET}"
        expiration-seconds:
          access-token: 900
          refresh-token: 1209600
        cookie:
          name: refresh_token
          path: /api/v1/auth
          same-site: Lax
          secure: false   # set to true (and same-site: None) in prod over https
  jmx:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mvc:
    servlet:
      path: /api/v1