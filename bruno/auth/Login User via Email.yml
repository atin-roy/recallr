info:
  name: Login User via Email
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/api/v1/auth/login
  body:
    type: json
    data: |-
      {
        "email": "user@example.com",
        "password": "password"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
