opencollection: 1.0.0

info:
  name: recallr
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  scripts:
    - type: after-response
      code: |-
        console.log("Access Token : " + res.body.accessToken)
        console.log("Refresh Token : " + res.body.refreshToken)
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
